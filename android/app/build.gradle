apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

/**
 * This is the configuration block to customize your React Native Android app.
 * By default você não precisa mexer em nada aqui, a menos que queira ajustar algo.
 */
react {
    entryFile = file(
        ["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"]
            .execute(null, rootDir)
            .text
            .trim()
    )
    reactNativeDir = new File(
        ["node", "--print", "require.resolve('react-native/package.json')"]
            .execute(null, rootDir)
            .text
            .trim()
    ).getParentFile().getAbsoluteFile()
    hermesCommand = new File(
        ["node", "--print", "require.resolve('react-native/package.json')"]
            .execute(null, rootDir)
            .text
            .trim()
    ).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(
        ["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"]
            .execute(null, rootDir)
            .text
            .trim()
    ).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    cliFile = new File(
        ["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"]
            .execute(null, rootDir)
            .text
            .trim()
    )
    bundleCommand = "export:embed"

    autolinkLibrariesWithApp()
}

/**
 * Habilita ou não Proguard no Release.
 */
def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()

/**
 * Flavor JavaScriptCore (JSC). Se quiser usar Intl, altere aqui.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    compileSdkVersion 35
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.zevitor.controle_contas'
    defaultConfig {
        applicationId "com.zevitor.controle_contas"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 2
        versionName "1.0.1"
    }

    // =======================
    // CONFIGURAÇÕES DE LINT
    // =======================
    lint {
        abortOnError false
        checkReleaseBuilds false
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            // Essas linhas fazem com que o lintVitalRelease não quebre o build
            lintOptions {
                checkReleaseBuilds false
                abortOnError false
            }
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
        }
    }

    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }

    // =======================
    // REMOÇÃO DO CMAKE / AUTOLINK
    // =======================
    // Observação: qualquer bloco externalNativeBuild foi removido para evitar erros de "build/generated/source/codegen/jni" ausentes
    //
    // Se, por acaso, existir algo assim em versões futuras:
    //
    // externalNativeBuild {
    //     cmake {
    //         path file('../node_modules/react-native/ReactAndroid/cmake-utils/default-app-setup/CMakeLists.txt')
    //     }
    // }
    //
    // comente ou elimine todo o bloco acima para pular a etapa de CMake/autolinking.
}

// Aplica valores estáticos de gradle.properties nos packagingOptions caso existam
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    for (i in 0..<options.size()) options[i] = options[i].trim();
    options -= ""
    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // A versão do react-native usado é controlada pelo React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // Suporte a GIF animado (Fresco)
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // Suporte a WebP
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // =======================
    // DEPENDÊNCIAS NATIVE MÓDULOS REACT
    // =======================
    implementation project(':@react-native-community_checkbox')
    implementation project(':@react-native-community_datetimepicker')
    implementation project(':@react-native-picker_picker')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-reanimated')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-edge-to-edge')
}
